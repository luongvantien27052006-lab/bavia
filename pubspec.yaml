name: bavia
description: Bavia Coffee - App đặt món khách hàng
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1

  # Storage
  flutter_secure_storage: ^9.0.0

  # Firebase (Phone Auth)
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  firebase_messaging: ^14.7.19

  # UI helpers
  cached_network_image: ^3.3.1
  intl: ^0.19.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true